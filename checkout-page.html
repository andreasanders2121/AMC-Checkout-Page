<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout</title>
</head>
<!--Checkout Form-->
<body>
<h1 style="text-align: center;">Checkout</h1>
<form action="/submit-checkout" method="POST">
<h2>1. Contact Information</h2>
<input type="email" name="email" placeholder="Email" required>

<h2>2. Shipping Address</h2>
<input type="text" name="firstName" placeholder="First Name" required>
<input type="text" name="lastName" placeholder="Last Name" required>
<input type="text" name="address" placeholder="Address" required>
<input type="text" name="address" placeholder="Apartment, suite, etc (optional)">
<input type="text" name="city" placeholder="City" required>
<label for="state">State</label>
<select id="state" name="state" required>
<option value="" disabled selected>Select a State</option>
<option value="AL">Alabama</option> 
<option value="AK">Alaska</option> 
<option value="AZ">Arizona</option> 
<option value="AR">Arkansas</option> 
<option value="CA">California</option> 
<option value="CO">Colorado</option> 
<option value="CT">Connecticut</option> 
<option value="DE">Delaware</option> 
<option value="FL">Florida</option> 
<option value="GA">Georgia</option> 
<option value="HI">Hawaii</option> 
<option value="ID">Idaho</option> 
<option value="IL">Illinois</option> 
<option value="IN">Indiana</option> 
<option value="IA">Iowa</option> 
<option value="KS">Kansas</option> 
<option value="KY">Kentucky</option> 
<option value="LA">Louisiana</option> 
<option value="ME">Maine</option> 
<option value="MD">Maryland</option> 
<option value="MA">Massachusetts</option> 
<option value="MI">Michigan</option> 
<option value="MN">Minnesota</option> 
<option value="MS">Mississippi</option> 
<option value="MO">Missouri</option> 
<option value="MT">Montana</option> 
<option value="NE">Nebraska</option> 
<option value="NV">Nevada</option> 
<option value="NH">New Hampshire</option> 
<option value="NJ">New Jersey</option> 
<option value="NM">New Mexico</option> 
<option value="NY">New York</option> 
<option value="NC">North Carolina</option> 
<option value="ND">North Dakota</option> 
<option value="OH">Ohio</option> 
<option value="OK">Oklahoma</option> 
<option value="OR">Oregon</option> 
<option value="PA">Pennsylvania</option> 
<option value="RI">Rhode Island</option> 
<option value="SC">South Carolina</option> 
<option value="SD">South Dakota</option> 
<option value="TN">Tennessee</option> 
<option value="TX">Texas</option> 
<option value="UT">Utah</option> 
<option value="VT">Vermont</option> 
<option value="VA">Virginia</option> 
<option value="WA">Washington</option> 
<option value="WV">West Virginia</option> 
<option value="WI">Wisconsin</option> 
<option value="WY">Wyoming</option>
</select>
<input type="text" name="zip-code" placeholder="Zip Code" required>
<input type="tel" name="phone-number" placeholder="Phone Number (optional)">


<h2>3.Shipping Method</h2>
<fieldset class="shipping-method-selection">
    <legend class="section-title">Select Shipping Method</legend>

    <!--Option 1: Standard Shipping-->
    <label class="method-option card-layout" for="shipping-standard">
        <input 
            type="radio"
            id="shipping-standard"
            name="shipping_method"
            value="standard"
            checked
            >
            <div class="method-details>">
                <span class="method-name"><strong>Standard Ground Shipping</strong></span>
                <span class="method-delivery">Delivered within <i>3-5</i> business days</span>
            </div>
            <span class="method-price">Free</span>
</label><br>

  <!--Option 2: Expedited Shipping-->
    <label class="method-option card-layout" for="shipping-expedited">
        <input 
            type="radio"
            id="shipping-expedited"
            name="shipping_method"
            value="expedited"
            >
            <div class="method-details>">
                <span class="method-name"><strong>Expedited Shipping</strong></span>
                <span class="method-delivery">Delivered within <i>2</i> business days</span>
            </div>
            <span class="method-price">$9.99</span>
</label><br>
<!--Option 3: Overnight Shipping-->
    <label class="method-option card-layout" for="shipping-overnight">
        <input 
            type="radio"
            id="shipping-overnight"
            name="shipping_method"
            value="overnight"
            >
            <div class="method-details>">
                <span class="method-name"><strong>Overnight Delivery</strong></span>
                <span class="method-delivery">Guaranteed <i>next</i> business day</span>
            </div>
            <span class="method-price">$24.99</span>
</label>
















</fieldset>







<h2>4.Payment Method</h2>
<input type="text" name="cardName" placeholder="Name on Card" required>
<input type="text" name="cardName" placeholder="Card Number" required>

<h2>Review Your Order</h2>
<p>Total: $100.00</p>

<button type="submit">Place Order</button>
</form>




</body>
</html>
